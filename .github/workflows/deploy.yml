name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - main
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - prd
          - hml

env:
  TF_VAR_project_id: ${{ vars.PROJECT_ID }}
  TF_VAR_service_name: ${{ vars.SERVICE_NAME }}
  TF_VAR_region: ${{ vars.REGION }}
  TF_VAR_image_tag: ${{ github.run_number }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    environment: hml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Auth for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.REGION }}-docker.pkg.dev
        

      - name: Build Docker Image
        run: |
          docker build -t ${{ vars.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/artefacts/${{ vars.SERVICE_NAME }}:latest .
          docker tag ${{ vars.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/artefacts/${{ vars.SERVICE_NAME }}:latest ${{ vars.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/artefacts/${{ vars.SERVICE_NAME }}:${{ github.run_number }}
      - name: Push Docker Image
        run: |
          docker push ${{ vars.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/artefacts/${{ vars.SERVICE_NAME }}:latest
          docker push ${{ vars.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/artefacts/${{ vars.SERVICE_NAME }}:${{ github.run_number }}

  deploy-hml:
    name: Deploy to HML
    needs: build-and-push
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    environment: hml
    env:
      TF_VAR_environment: hml
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ vars.PROJECT_ID }}-tfstate" -backend-config="prefix=${{ vars.PROJECT_ID }}/${{ vars.SERVICE_NAME }}/${{ vars.ENVIRONMENT }}" -reconfigure

      - name: Terraform Plan HML
        run: terraform plan 

      - name: Terraform Apply HML
        run: terraform apply -auto-approve 
  deploy-prod:
    name: Deploy to PRD
    needs: deploy-hml
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    environment: prd
    env:
      TF_VAR_environment: prd
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ vars.PROJECT_ID }}-tfstate" -backend-config="prefix=${{ vars.PROJECT_ID }}/${{ vars.SERVICE_NAME }}/${{ vars.ENVIRONMENT }}" -reconfigure

      - name: Terraform Apply PRD
        run: terraform apply -auto-approve 

  destroy-hml:
    name: Destroy HML
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    environment: hml
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ vars.PROJECT_ID }}-tfstate" -backend-config="prefix=${{ vars.PROJECT_ID }}/${{ vars.SERVICE_NAME }}/${{ vars.ENVIRONMENT }}" -reconfigure

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
    